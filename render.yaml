services:
  - type: web
    name: 602-ops-portal
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    preDeployCommand: npm run prisma:deploy
    startCommand: npm run start
    autoDeployTrigger: checksPass
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: 602-ops-portal-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: NODE_VERSION
        value: 22

databases:
  - name: 602-ops-portal-db
    databaseName: ops_portal
    user: ops_portal_user
    plan: basic-256mb
